blueprint:
  name: ESPHome Switch32 Three Button
  author: hisbaan
  description: |
    Automation blueprint for the ESPHome Switch32 three-button smart switch.
    Supports single press, double press, long hold started, and long hold stopped for each button.
  domain: automation
  source_url: https://raw.githubusercontent.com/hisbaan/homeassistant/refs/heads/main/blueprints/automation/switch32-three-button.yaml

  input:
    setup:
      name: Button Event
      description: Select the combined ESPHome event entity exposed by the switch.
      collapsed: true
      input:
        button_event:
          name: Button Event
          description: Select the combined event entity for the switch.
          selector:
            entity:
              filter:
                - domain: event

    button1:
      name: 1 Button 1 Actions
      description: Define actions for Button 1.
      collapsed: true
      input:
        button1_single:
          name: Single Pressed
          default: []
          selector:
            action: {}

        button1_double:
          name: Double Pressed
          default: []
          selector:
            action: {}

        button1_long_hold_started:
          name: Long Hold Started
          default: []
          selector:
            action: {}

        button1_long_hold_stopped:
          name: Long Hold Stopped
          default: []
          selector:
            action: {}

    button2:
      name: 2 Button 2 Actions
      description: Define actions for Button 2.
      collapsed: true
      input:
        button2_single:
          name: Single Pressed
          default: []
          selector:
            action: {}

        button2_double:
          name: Double Pressed
          default: []
          selector:
            action: {}

        button2_long_hold_started:
          name: Long Hold Started
          default: []
          selector:
            action: {}

        button2_long_hold_stopped:
          name: Long Hold Stopped
          default: []
          selector:
            action: {}

    button3:
      name: 3 Button 3 Actions
      description: Define actions for Button 3.
      collapsed: true
      input:
        button3_single:
          name: Single Pressed
          default: []
          selector:
            action: {}

        button3_double:
          name: Double Pressed
          default: []
          selector:
            action: {}

        button3_long_hold_started:
          name: Long Hold Started
          default: []
          selector:
            action: {}

        button3_long_hold_stopped:
          name: Long Hold Stopped
          default: []
          selector:
            action: {}

mode: restart

trigger:
  - platform: state
    entity_id: !input button_event
    not_from:
      - unknown
      - unavailable
    not_to:
      - unknown
      - unavailable
    id: button_event

condition: []

action:
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ trigger.to_state.attributes.event_type == 'button_1_single_pressed' }}"
        sequence: !input button1_single

      - conditions:
          - condition: template
            value_template: "{{ trigger.to_state.attributes.event_type == 'button_1_double_pressed' }}"
        sequence: !input button1_double

      - conditions:
          - condition: template
            value_template: "{{ trigger.to_state.attributes.event_type == 'button_1_long_hold_started' }}"
        sequence: !input button1_long_hold_started

      - conditions:
          - condition: template
            value_template: "{{ trigger.to_state.attributes.event_type == 'button_1_long_hold_stopped' }}"
        sequence: !input button1_long_hold_stopped

      - conditions:
          - condition: template
            value_template: "{{ trigger.to_state.attributes.event_type == 'button_2_single_pressed' }}"
        sequence: !input button2_single

      - conditions:
          - condition: template
            value_template: "{{ trigger.to_state.attributes.event_type == 'button_2_double_pressed' }}"
        sequence: !input button2_double

      - conditions:
          - condition: template
            value_template: "{{ trigger.to_state.attributes.event_type == 'button_2_long_hold_started' }}"
        sequence: !input button2_long_hold_started

      - conditions:
          - condition: template
            value_template: "{{ trigger.to_state.attributes.event_type == 'button_2_long_hold_stopped' }}"
        sequence: !input button2_long_hold_stopped

      - conditions:
          - condition: template
            value_template: "{{ trigger.to_state.attributes.event_type == 'button_3_single_pressed' }}"
        sequence: !input button3_single

      - conditions:
          - condition: template
            value_template: "{{ trigger.to_state.attributes.event_type == 'button_3_double_pressed' }}"
        sequence: !input button3_double

      - conditions:
          - condition: template
            value_template: "{{ trigger.to_state.attributes.event_type == 'button_3_long_hold_started' }}"
        sequence: !input button3_long_hold_started

      - conditions:
          - condition: template
            value_template: "{{ trigger.to_state.attributes.event_type == 'button_3_long_hold_stopped' }}"
        sequence: !input button3_long_hold_stopped
