mode: single
blueprint:
  name: Presence Lighting
  author: hisbaan
  description: |
    Turns configured lights off when everyone leaves home, and turns configured
    lights on when someone arrives or when the configured pre-sunset lighting
    window begins - but only if presence is detected by any configured zone or
    binary sensor and it is within the lights-on window. Supports additional
    custom actions for leave and arrive events.
  domain: automation
  source_url: https://raw.githubusercontent.com/hisbaan/homeassistant/refs/heads/main/blueprints/automation/presence-lighting.yaml

  input:
    setup:
      name: ⚙️ Setup
      collapsed: true
      input:
        lights_on_target:
          name: Lights To Turn On
          description: The light, light group, or area to turn on when someone arrives or the pre-sunset window begins.
          selector:
            target:
              entity:
                domain: light

        lights_off_target:
          name: Lights To Turn Off
          description: The light, light group, or area to turn off when everyone leaves home.
          selector:
            target:
              entity:
                domain: light

        presence_entities:
          name: Presence Zones Or Sensors
          description: >
            Zones or binary sensors to use for presence. Presence is detected
            when any binary sensor is on or any zone count is greater than 0.
          default:
            - zone.home
          selector:
            entity:
              multiple: true
              filter:
                - domain: zone
                - domain: binary_sensor

        sunset_offset_minutes:
          name: Sunset Offset
          description: >
            Minutes before sunset to start the lights-on window. Use 0 to turn
            lights on at sunset.
          default: 30
          selector:
            number:
              min: 0
              max: 180
              step: 1
              unit_of_measurement: min
              mode: box

    actions:
      name: 🎬 Additional Actions
      collapsed: true
      input:
        leave_actions:
          name: Leave Actions
          description: Additional actions to run after turning off the configured leave lights.
          default: []
          selector:
            action: {}

        arrive_actions:
          name: Arrive Actions
          description: Additional actions to run after turning on the configured arrival lights.
          default: []
          selector:
            action: {}

trigger_variables:
  sunset_offset_minutes: !input sunset_offset_minutes

trigger:
  - trigger: state
    entity_id: !input presence_entities
    id: presence_changed

  - trigger: template
    value_template: >
      {% set next_setting = state_attr('sun.sun', 'next_setting') %}
      {% set sunset = as_timestamp(next_setting) if next_setting else none %}
      {% set offset_seconds = (sunset_offset_minutes | int(30)) * 60 %}
      {{
        is_state('sun.sun', 'below_horizon')
        or (
          is_state('sun.sun', 'above_horizon')
          and sunset is not none
          and (sunset - offset_seconds) <= as_timestamp(now()) < sunset
        )
      }}
    id: lights_on_time

condition: []

action:
  - variables:
      presence_entities: !input presence_entities
      presence_detected: >
        {% set ns = namespace(present=false) %}
        {% for entity_id in presence_entities %}
          {% set state = states(entity_id) %}
          {% if state == 'on' or (state | int(0)) > 0 %}
            {% set ns.present = true %}
          {% endif %}
        {% endfor %}
        {{ ns.present }}
      presence_detected_before: >
        {% set ns = namespace(present=false) %}
        {% for entity_id in presence_entities %}
          {% set state = states(entity_id) %}
          {% if trigger.entity_id is defined and trigger.entity_id == entity_id and trigger.from_state is not none %}
            {% set state = trigger.from_state.state %}
          {% endif %}
          {% if state == 'on' or (state | int(0)) > 0 %}
            {% set ns.present = true %}
          {% endif %}
        {% endfor %}
        {{ ns.present }}
      sunset_offset_minutes: !input sunset_offset_minutes
  - choose:
      # Everyone left -> turn off lights unconditionally
      - conditions:
          - condition: trigger
            id: presence_changed
          - condition: template
            value_template: "{{ presence_detected_before | bool(false) and not (presence_detected | bool(false)) }}"
        sequence:
          - action: light.turn_off
            target: !input lights_off_target
            data: {}
          - sequence: !input leave_actions

      # Someone arrived or the lights-on window starts -> turn on lights only if home
      - conditions:
          - condition: or
            conditions:
              - condition: and
                conditions:
                  - condition: trigger
                    id: presence_changed
                  - condition: template
                    value_template: "{{ not (presence_detected_before | bool(false)) and (presence_detected | bool(false)) }}"
              - condition: trigger
                id: lights_on_time
          - condition: template
            value_template: "{{ presence_detected | bool(false) }}"
          - condition: or
            conditions:
              - condition: state
                entity_id: sun.sun
                state: "below_horizon"
              - condition: template
                value_template: >
                  {% set next_setting = state_attr('sun.sun', 'next_setting') %}
                  {% set sunset = as_timestamp(next_setting) if next_setting else none %}
                  {% set offset_seconds = (sunset_offset_minutes | int(30)) * 60 %}
                  {{
                    is_state('sun.sun', 'above_horizon')
                    and sunset is not none
                    and (sunset - offset_seconds) <= as_timestamp(now()) < sunset
                  }}
        sequence:
          - action: light.turn_on
            target: !input lights_on_target
            data: {}
          - sequence: !input arrive_actions
